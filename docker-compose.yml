services:
  traefik:
    image: "traefik"
    restart: always
    command:
      - "--api=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.mytlschallenge.acme.tlschallenge=true"
      - "--certificatesresolvers.mytlschallenge.acme.email=${SSL_EMAIL}"
      - "--certificatesresolvers.mytlschallenge.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik_data:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro

  video-downloader:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.routers.video-downloader.rule=Host(`api.${DOMAIN_NAME}`)
      - traefik.http.routers.video-downloader.tls=true
      - traefik.http.routers.video-downloader.entrypoints=web,websecure
      - traefik.http.routers.video-downloader.tls.certresolver=mytlschallenge
      - traefik.http.services.video-downloader.loadbalancer.server.port=8000
    volumes:
      - ./video-downloader/cookies.txt:/app/cookies.txt
    networks:
      - default

volumes:
  traefik_data:
    external: true
