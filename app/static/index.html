<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            background: linear-gradient(90deg, #00d4aa, #00a8e8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        input[type="url"] {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #2a2a4a;
            border-radius: 12px;
            background: #0f0f23;
            color: #e0e0e0;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="url"]:focus {
            border-color: #00d4aa;
        }
        button {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #00d4aa, #00a8e8);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            color: #888;
        }
        .error {
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid #ff4757;
            color: #ff6b81;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .video-info {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .video-info img {
            width: 200px;
            border-radius: 12px;
            object-fit: cover;
        }
        .video-meta h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: #fff;
        }
        .video-meta p {
            color: #888;
            font-size: 0.95rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            overflow: hidden;
        }
        th, td {
            padding: 14px 18px;
            text-align: left;
        }
        th {
            background: rgba(255,255,255,0.08);
            font-weight: 600;
            color: #00d4aa;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        tr:not(:last-child) td {
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        tr:hover td {
            background: rgba(255,255,255,0.03);
        }
        .quality {
            font-weight: 700;
            color: #fff;
        }
        .format {
            color: #888;
            font-size: 0.85rem;
        }
        .download-btn {
            padding: 8px 18px;
            font-size: 14px;
            border-radius: 8px;
        }
        @media (max-width: 600px) {
            .video-info { flex-direction: column; }
            .video-info img { width: 100%; }
            .input-box { flex-direction: column; }
            table { font-size: 0.85rem; }
            th, td { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Video Downloader</h1>
        <div class="input-box">
            <input type="url" id="urlInput" placeholder="Paste YouTube or video URL here..." value="https://www.youtube.com/watch?v=dQw4w9WgXcQ">
            <button id="fetchBtn" onclick="fetchVideo()">Fetch Formats</button>
        </div>
        <div id="result"></div>
    </div>

    <script>
        const API_BASE = '';

        async function fetchVideo() {
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('fetchBtn');
            const result = document.getElementById('result');

            if (!url) {
                result.innerHTML = '<div class="error">Please enter a URL.</div>';
                return;
            }

            btn.disabled = true;
            result.innerHTML = '<div class="loading">⏳ Extracting video info...</div>';

            try {
                const res = await fetch(`${API_BASE}/extract?url=${encodeURIComponent(url)}`);
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || `Server error: ${res.status}`);
                }
                const data = await res.json();
                render(data);
            } catch (e) {
                result.innerHTML = `<div class="error">❌ ${e.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function render(data) {
            const mins = Math.floor(data.duration / 60);
            const secs = data.duration % 60;
            const duration = `${mins}:${secs.toString().padStart(2, '0')}`;

            let html = `
                <div class="video-info">
                    <img src="${data.thumbnail}" alt="thumbnail">
                    <div class="video-meta">
                        <h2>${escapeHtml(data.title)}</h2>
                        <p>⏱️ Duration: ${duration}</p>
                        <p>📁 ${data.formats.length} format(s) available</p>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Quality</th>
                            <th>Format</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.formats.forEach((fmt, i) => {
                html += `
                    <tr>
                        <td>
                            <div class="quality">${fmt.quality}</div>
                        </td>
                        <td>
                            <div class="format">${fmt.ext.toUpperCase()} · ID: ${fmt.format_id}</div>
                        </td>
                        <td>
                            <button class="download-btn" onclick="downloadVideo('${escapeJs(fmt.format_id)}', '${escapeJs(data.title)}', '${escapeJs(fmt.quality)}', '${escapeJs(fmt.ext)}')">⬇️ Download</button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            document.getElementById('result').innerHTML = html;
        }

        function downloadVideo(format_id, title, quality, ext) {
            const urlInput = document.getElementById('urlInput').value.trim();
            // Build proxy download URL
            const proxyUrl = `${API_BASE}/download?url=${encodeURIComponent(urlInput)}&format_id=${encodeURIComponent(format_id)}`;
            const a = document.createElement('a');
            a.href = proxyUrl;
            a.download = `${sanitizeFilename(title)}_${quality}.${ext}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeJs(str) {
            return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        function sanitizeFilename(name) {
            return name.replace(/[\\/:*?"<>|]/g, '').substring(0, 80);
        }

        // Allow Enter key to submit
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchVideo();
        });
    </script>
</body>
</html>
